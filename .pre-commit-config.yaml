fail_fast: True

ci:
  # Commit name when auto fixing PRs.
  autofix_commit_msg: |
    ci: auto fixes from pre-commit.com hooks.

    for more information, see https://pre-commit.ci

  # PR name when autoupdate
  autoupdate_commit_msg: 'ci: pre-commit autoupdate'


repos:
- repo: https://github.com/shellcheck-py/shellcheck-py
  rev: 745eface02aef23e168a8afb6b5737818efbea95  # frozen: v0.11.0.1
  hooks:
    - id: shellcheck
      args: [ "-x"]

- repo: https://github.com/pre-commit/mirrors-mypy
  rev: d2823d321df3af8f878f7ee3414dc94d037145b9  # frozen: v2.1.0
  hooks:
    - id: mypy
      args: [ --follow-imports=silent, --config-file=pyproject.toml]
      exclude: ^(doc/|examples/)

- repo: https://github.com/ansys/pre-commit-hooks
  rev: 55c5b6a5439abd847613579c6924da750e8b78b2  # frozen: v0.8.0
  hooks:
  - id: add-license-headers
    args:
    - --start_year=2016

- repo: https://github.com/pycqa/isort
  rev: dac090ce4d9ee313d086e2e89ab1acb8c2664fa1  # frozen: 9.0.0a3
  hooks:
  - id: isort

- repo: https://github.com/numpy/numpydoc
  rev: 7625e372b78ed5689b2707b07b57d45ce39f6b4a  # frozen: v1.11.0rc0
  hooks:
    - id: numpydoc-validation
      exclude: |
          (?x)(
              tests/|
              examples|
              doc/source/|
              src/ansys/mapdl/core/_commands|
              src/ansys/mapdl/core/commands
          )

- repo: https://github.com/adamchainz/blacken-docs
  rev: dda8db18cfc68df532abf33b185ecd12d5b7b326  # frozen: 1.20.0
  hooks:
  - id: blacken-docs
    additional_dependencies: [black==25.12.0]

- repo: https://github.com/psf/black-pre-commit-mirror
  rev: 4160603246a6b365d4a2af661c6d71b0a0f50478  # frozen: 26.5.1
  hooks:
  - id: black
    args:
      - --line-length=88

- repo: https://github.com/PyCQA/flake8
  rev: d93590f5be797aabb60e3b09f2f52dddb02f349f  # frozen: 7.3.0
  hooks:
  - id: flake8

- repo: https://github.com/codespell-project/codespell
  rev: 2ccb47ff45ad361a21071a7eedda4c37e6ae8c5a  # frozen: v2.4.2
  hooks:
  - id: codespell
    args: ["--toml", "pyproject.toml"]
    additional_dependencies: ["tomli"]

# - repo: https://github.com/pycqa/pydocstyle
#   rev: 6.1.1
#   hooks:
#   - id: pydocstyle
#     additional_dependencies: [toml]
#     exclude: "tests/"

- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
  hooks:
  - id: check-merge-conflict
  - id: debug-statements
  - id: end-of-file-fixer
  - id: detect-private-key
  - id: trailing-whitespace
  - id: check-toml
  - id: mixed-line-ending
    args: ['--fix=lf']
    description: Forces to replace line ending by the UNIX 'lf' character.

# this validates our github workflow files
- repo: https://github.com/python-jsonschema/check-jsonschema
  rev: 8ef330cbb7204d388aa7a620f9549bcea8009663  # frozen: 0.37.3
  hooks:
    - id: check-github-workflows

- repo: https://github.com/ComPWA/taplo-pre-commit
  rev: 23eab0f0eedcbedebff420f5fdfb284744adc7b3  # frozen: v0.9.3
  hooks:
    - id: taplo-format
      # See options: https://taplo.tamasfe.dev/configuration/formatter-options.html
      args: [--option, "reorder_arrays=true", --option, "reorder_keys=true"]

- repo: https://github.com/zizmorcore/zizmor-pre-commit
  rev: e3eebf65325ccc992422292cb7a4baee967cf815  # frozen: v1.26.1
  hooks:
    - id: zizmor
      args: ["--pedantic"]

# Security checks with bandit
- repo: https://github.com/PyCQA/bandit
  rev: 92ae8b82fb422a639f0ed8d99e96cea769594e08  # frozen: 1.9.4
  hooks:
    - id: bandit
      args: ['-c', 'pyproject.toml']
      additional_dependencies: ['bandit[toml]']
