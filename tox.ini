[tox]
description = Default tox environments list
envlist =
    style,{py310,py311,py312,py313}{,-coverage},doc
skip_missing_interpreters = true
isolated_build = true
isolated_build_env = build

[testenv]
description = Checks for project unit tests and coverage (if desired)
basepython =
    py310: python3.10
    py311: python3.11
    py312: python3.12
    py313: python3.13
    py: python3
    {style,doc}: python3
setenv =
    PYTHONUNBUFFERED = yes
    coverage: PYTEST_EXTRA_ARGS = --cov=ansys.mapdl --cov-report=term --cov-report=xml:.cov/xml --cov-report=html:.cov/html
extras = tests
commands =
    pytest {env:PYTEST_MARKERS:} {env:PYTEST_EXTRA_ARGS:} {posargs:-vv}

[testenv:style]
description = Checks project code style
deps =
    pre-commit
commands =
    pre-commit install
    pre-commit run --all-files --show-diff-on-failure

[testenv:doc]
description = Check if documentation generates properly
extras = doc
commands =
    sphinx-build -d "{toxworkdir}/doc_doctree" doc/source "{toxworkdir}/doc_out" --color -vW -bhtml


# =============================================================================
# Docker testing environments
# =============================================================================
# Copy docker/testing/example.env to docker/testing/.env and fill in your
# credentials. If the file does not exist, environment variables from the
# shell are used as-is.
#
# Usage:
#   tox -e docker-remote           # full run, rebuild image
#   tox -e docker-local            # full run, rebuild image
#   tox -e docker-build-remote     # rebuild image only, do not run tests
#   tox -e docker-build-local      # rebuild image only, do not run tests
#   tox -e docker-run-remote       # re-run using cached image, no rebuild (needs prior docker-remote)
#   tox -e docker-run-local        # re-run using cached image, no rebuild (needs prior docker-local)

[testenv:docker-build-remote]
description =
    Rebuild the pymapdl-host image without running tests.
    Useful to pre-warm the cache before iterating with docker-run-remote.
skip_install = true
allowlist_externals =
    docker
    python
env_files =
    {toxinidir}/docker/testing/.env
passenv =
    DOCKER_IMAGE
commands =
    docker compose \
        -f {toxinidir}/docker/testing/docker-compose.yml \
        --profile remote-host \
        build

[testenv:docker-build-local]
description =
    Rebuild the mapdl-local-host image without running tests.
    Useful to pre-warm the cache before iterating with docker-run-local.
skip_install = true
allowlist_externals =
    docker
    python
env_files =
    {toxinidir}/docker/testing/.env
passenv =
    DOCKER_IMAGE
commands =
    docker compose \
        -f {toxinidir}/docker/testing/docker-compose.yml \
        --profile local-host \
        build

[testenv:docker-remote]
description =
    Build image and run tests with remote MAPDL (container) + host PyMAPDL.
    Equivalent to: docker compose --profile remote-host up --abort-on-container-exit
skip_install = true
allowlist_externals =
    docker
    python
env_files =
    {toxinidir}/docker/testing/.env
passenv =
    ANSYSLMD_LICENSE_FILE
    DOCKER_IMAGE
    PYTEST_ARGUMENTS
commands_pre =
    python -c "import os,sys; sys.exit('ERROR: ANSYSLMD_LICENSE_FILE is not set. Add it to docker/testing/.env or export it in your shell.') if not os.environ.get('ANSYSLMD_LICENSE_FILE') else None"
commands =
    docker compose \
        -f {toxinidir}/docker/testing/docker-compose.yml \
        --profile remote-host \
        up \
        --abort-on-container-exit \
        --exit-code-from pymapdl-host \
        --no-log-prefix \
        --attach pymapdl-host

[testenv:docker-local]
description =
    Build image and run tests with local MAPDL (inside the same container as PyMAPDL).
    Equivalent to: docker compose --profile local-host up --abort-on-container-exit
skip_install = true
allowlist_externals =
    docker
    python
env_files =
    {toxinidir}/docker/testing/.env
passenv =
    ANSYSLMD_LICENSE_FILE
    DOCKER_IMAGE
    PYTEST_ARGUMENTS
commands_pre =
    python -c "import os,sys; sys.exit('ERROR: ANSYSLMD_LICENSE_FILE is not set. Add it to docker/testing/.env or export it in your shell.') if not os.environ.get('ANSYSLMD_LICENSE_FILE') else None"
commands =
    docker compose \
        -f {toxinidir}/docker/testing/docker-compose.yml \
        --profile local-host \
        up \
        --abort-on-container-exit \
        --exit-code-from mapdl-local-host \
        --no-log-prefix \
        --attach mapdl-local-host

[testenv:docker-run-remote]
description =
    Re-run tests using the already-built pymapdl-host image (no rebuild).
    Starts a fresh container from the cached image, runs start.sh, then removes it.
    Run 'tox -e docker-remote' at least once first to build the image.
    Pass pytest arguments directly: tox -e docker-run-remote -- -k test_foo --no-cov
skip_install = true
allowlist_externals =
    docker
    python
env_files =
    {toxinidir}/docker/testing/.env
passenv =
    ANSYSLMD_LICENSE_FILE
    DOCKER_IMAGE
    PYTEST_ARGUMENTS
commands_pre =
    python -c "import os,sys; sys.exit('ERROR: ANSYSLMD_LICENSE_FILE is not set. Add it to docker/testing/.env or export it in your shell.') if not os.environ.get('ANSYSLMD_LICENSE_FILE') else None"
commands =
    docker compose \
        -f {toxinidir}/docker/testing/docker-compose.yml \
        --profile remote-host \
        run \
        -e PYTEST_ARGUMENTS={posargs:{env:PYTEST_ARGUMENTS:tests}} \
        pymapdl-host

[testenv:docker-run-local]
description =
    Re-run tests using the already-built mapdl-local-host image (no rebuild).
    Starts a fresh container from the cached image, runs start.sh, then removes it.
    Run 'tox -e docker-local' at least once first to build the image.
    Pass pytest arguments directly: tox -e docker-run-local -- -k test_foo --no-cov
skip_install = true
allowlist_externals =
    docker
    python
env_files =
    {toxinidir}/docker/testing/.env
passenv =
    ANSYSLMD_LICENSE_FILE
    DOCKER_IMAGE
    PYTEST_ARGUMENTS
commands_pre =
    python -c "import os,sys; sys.exit('ERROR: ANSYSLMD_LICENSE_FILE is not set. Add it to docker/testing/.env or export it in your shell.') if not os.environ.get('ANSYSLMD_LICENSE_FILE') else None"
commands =
    docker compose \
        -f {toxinidir}/docker/testing/docker-compose.yml \
        --profile local-host \
        run \
        -e PYTEST_ARGUMENTS={posargs:{env:PYTEST_ARGUMENTS:tests}} \
        mapdl-local-host
